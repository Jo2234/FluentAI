name: smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Ruff safety lint
        run: ruff check .
      - name: Unit tests
        run: python -m unittest discover -s tests -q
      - name: Offline smoke demo
        run: python scripts/smoke_demo.py
      - name: CLI lesson smoke
        run: python -m fluent_ai.app --once --mode auto --state-path /tmp/fluentai-lesson.json
      - name: CLI conversation smoke
        run: python -m fluent_ai.app --product-mode conversation --turns 2 --video on --video-object apple --mode auto --state-path /tmp/fluentai-conversation.json

  node-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install desktop deps
        run: npm ci
      - name: Desktop files exist
        run: test -f desktop/electron/main.js && test -f desktop/electron/renderer.html && test -f desktop/electron/preload.js
